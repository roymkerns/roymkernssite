<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Roy M. Kerns</title>
    <meta name="description" content="Art, illustrations, and behind-the-scenes content from Roy M. Kerns — author of the Xerxes Trilogy.">
    <meta name="theme-color" content="#05050A">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anta&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/styles.css">

    <style>
        /* ── PAGE HEADER ── */
        .portfolio-header {
            padding-block: calc(var(--nav-h) + 4rem) 3rem;
        }

        /* ── FILTER BAR ── */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }

        .filter-btn {
            font-family: var(--font-display);
            font-size: 0.62rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.5rem 1.25rem;
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s ease;
            clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
        }

            .filter-btn:hover {
                border-color: var(--text-muted);
                color: var(--text);
            }

            .filter-btn.active {
                background: var(--purple);
                border-color: var(--purple);
                color: var(--text);
                box-shadow: var(--glow-purple);
            }

        /* ── PORTFOLIO GRID ── */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* ── PORTFOLIO CARD ── */
        .portfolio-item {
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .portfolio-item__img {
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--bg-surface);
            border: 1px solid var(--border-sub);
            position: relative;
            transition: border-color 0.3s ease;
        }

        .portfolio-item:hover .portfolio-item__img {
            border-color: var(--border);
        }

        .portfolio-item__img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, filter 0.3s ease;
        }

        .portfolio-item:hover .portfolio-item__img img {
            transform: scale(1.05);
        }

        /* Hover overlay */
        .portfolio-item__overlay {
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 10, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .portfolio-item:hover .portfolio-item__overlay {
            opacity: 1;
        }

        .portfolio-item__overlay-icon {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        .portfolio-item__body {
            padding: 0.85rem 0.25rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .portfolio-item__cat {
            font-family: var(--font-display);
            font-size: 0.58rem;
            letter-spacing: 0.3em;
            color: var(--orange);
            text-transform: uppercase;
        }

        .portfolio-item__title {
            font-family: var(--font-display);
            font-size: 0.88rem;
            letter-spacing: 0.05em;
            color: var(--text);
            line-height: 1.3;
        }

        .portfolio-item__desc {
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── SKELETON LOADING ── */
        .skeleton-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .skeleton-img {
            aspect-ratio: 1;
            background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-elevated) 50%, var(--bg-surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }

        .skeleton-line {
            height: 0.75rem;
            background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-elevated) 50%, var(--bg-surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }

        .skeleton-line--short {
            width: 55%;
        }

        .skeleton-line--med {
            width: 80%;
        }

        @keyframes shimmer {
            from {
                background-position: -200% 0;
            }

            to {
                background-position: 200% 0;
            }
        }

        /* ── EMPTY & ERROR STATES ── */
        .state-message {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
            text-align: center;
            gap: 1rem;
        }

        .state-message__icon {
            font-size: 2.5rem;
            opacity: 0.2;
        }

        .state-message__title {
            font-family: var(--font-display);
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .state-message__body {
            font-family: var(--font-body);
            font-size: 0.88rem;
            color: var(--text-dim);
            font-style: italic;
            max-width: 360px;
            line-height: 1.7;
        }

        /* ── ITEM COUNT ── */
        .portfolio-count {
            font-family: var(--font-display);
            font-size: 0.62rem;
            letter-spacing: 0.25em;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            min-height: 1rem;
        }

        /* ── LIGHTBOX ── */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

            .lightbox[hidden] {
                display: none;
            }

        .lightbox__backdrop {
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 10, 0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .lightbox__panel {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2.5rem;
            align-items: center;
            max-width: 1100px;
            width: 100%;
            max-height: 90vh;
        }

        .lightbox__img-wrap {
            position: relative;
            max-height: 82vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox__img {
            max-width: 100%;
            max-height: 82vh;
            object-fit: contain;
            display: block;
        }

        .lightbox__info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 82vh;
            overflow-y: auto;
        }

        .lightbox__cat {
            font-family: var(--font-display);
            font-size: 0.6rem;
            letter-spacing: 0.38em;
            color: var(--orange);
            text-transform: uppercase;
        }

        .lightbox__title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            letter-spacing: 0.04em;
            color: var(--text);
            line-height: 1.2;
        }

        .lightbox__desc {
            font-family: var(--font-body);
            font-size: 0.95rem;
            line-height: 1.85;
            color: var(--text-muted);
        }

        .lightbox__counter {
            font-family: var(--font-display);
            font-size: 0.6rem;
            letter-spacing: 0.28em;
            color: var(--text-dim);
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border-sub);
        }

        /* Lightbox nav arrows */
        .lightbox__nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            width: 44px;
            height: 44px;
            border: 1px solid var(--border);
            background: rgba(5,5,10,0.7);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
        }

            .lightbox__nav:hover {
                border-color: var(--purple);
                color: var(--text);
                background: rgba(138,53,232,0.15);
            }

        .lightbox__nav--prev {
            left: -56px;
        }

        .lightbox__nav--next {
            right: -56px;
        }

        .lightbox__nav:disabled {
            opacity: 0.25;
            cursor: default;
            pointer-events: none;
        }

        /* Close button */
        .lightbox__close {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 2;
            width: 40px;
            height: 40px;
            border: 1px solid var(--border-sub);
            background: rgba(5,5,10,0.8);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
        }

            .lightbox__close:hover {
                border-color: var(--orange);
                color: var(--text);
            }

        /* Lightbox responsive */
        @media (max-width: 840px) {
            .lightbox__panel {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto;
                gap: 1.5rem;
                max-height: 90vh;
                overflow-y: auto;
            }

            .lightbox__img {
                max-height: 60vw;
            }

            .lightbox__nav--prev {
                left: 0.5rem;
            }

            .lightbox__nav--next {
                right: 0.5rem;
            }

            .lightbox__info {
                max-height: none;
            }
        }

        @media (max-width: 480px) {
            .lightbox {
                padding: 1rem;
            }
        }
    </style>
